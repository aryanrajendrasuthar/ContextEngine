
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "contextengine.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
      annotations:
        {{- if eq $name "embedding-service" }}
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ $svc.port | quote }}
        {{- else if ne $name "frontend" }}
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: {{ $svc.port | quote }}
        {{- end }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.global.image.registry }}/{{ $name }}:{{ $.Values.global.image.tag }}"
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          {{- if ne $name "frontend" }}
          envFrom:
            - configMapRef:
                name: contextengine-config
            {{- if ne $name "embedding-service" }}
            - secretRef:
                name: contextengine-secrets
            {{- end }}
          {{- if ne $name "gateway" }}
          env:
            - name: SERVER_PORT
              value: {{ $svc.port | quote }}
          {{- end }}
          {{- end }}
          resources:
            requests:
              cpu: {{ $svc.resources.requests.cpu | quote }}
              memory: {{ $svc.resources.requests.memory | quote }}
            limits:
              cpu: {{ $svc.resources.limits.cpu | quote }}
              memory: {{ $svc.resources.limits.memory | quote }}
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ if eq $name "embedding-service" }}60{{ else }}45{{ end }}
            periodSeconds: 15
            failureThreshold: {{ if eq $name "embedding-service" }}5{{ else }}3{{ end }}
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ if eq $name "embedding-service" }}60{{ else }}30{{ end }}
            periodSeconds: 10
            failureThreshold: {{ if eq $name "embedding-service" }}5{{ else }}3{{ end }}
{{- end }}
