
apiVersion: v1
kind: ConfigMap
metadata:
  name: contextengine-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "contextengine.labels" . | nindent 4 }}
data:
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.config.kafka.bootstrapServers | quote }}
  REDIS_HOST: {{ .Values.config.redis.host | quote }}
  REDIS_PORT: {{ .Values.config.redis.port | quote }}
  SPRING_DATASOURCE_URL: {{ .Values.config.database.url | quote }}
  NEO4J_URI: {{ .Values.config.neo4j.uri | quote }}
  NEO4J_USERNAME: {{ .Values.config.neo4j.username | quote }}
  QDRANT_HOST: {{ .Values.config.qdrant.host | quote }}
  QDRANT_PORT: {{ .Values.config.qdrant.port | quote }}
  OLLAMA_BASE_URL: {{ .Values.config.ollama.baseUrl | quote }}
  OLLAMA_EMBEDDING_MODEL: {{ .Values.config.ollama.embeddingModel | quote }}
  OLLAMA_CHAT_MODEL: {{ .Values.config.ollama.chatModel | quote }}
  OLLAMA_TIMEOUT_SECONDS: {{ .Values.config.ollama.timeoutSeconds | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.cors.allowedOrigins | quote }}
  PII_DETECTION_ENABLED: {{ .Values.config.piiDetectionEnabled | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  {{- range $name, $svc := .Values.services }}
  {{- if and (ne $name "frontend") (ne $name "embedding-service") }}
  {{ upper $name | replace "-" "_" }}_URL: "http://{{ $name }}:{{ $svc.port }}"
  {{- end }}
  {{- end }}
