
apiVersion: v1
kind: Secret
metadata:
  name: contextengine-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "contextengine.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.secrets.databaseUsername | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.secrets.databasePassword | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.neo4jPassword | quote }}
  QDRANT_API_KEY: {{ .Values.secrets.qdrantApiKey | quote }}
