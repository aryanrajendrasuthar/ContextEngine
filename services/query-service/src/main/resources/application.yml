
server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: query-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/contextengine}
    username: ${SPRING_DATASOURCE_USERNAME:contextengine}
    password: ${SPRING_DATASOURCE_PASSWORD:contextengine_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      pool-name: QueryServicePool
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6334}
  api-key: ${QDRANT_API_KEY:}
  top-k: ${QDRANT_TOP_K:8}

neo4j:
  uri: ${NEO4J_URI:bolt://localhost:7687}
  username: ${NEO4J_USERNAME:neo4j}
  password: ${NEO4J_PASSWORD:contextengine_secret}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
  chat-model: ${OLLAMA_CHAT_MODEL:llama3.1:8b}
  timeout-seconds: ${OLLAMA_TIMEOUT_SECONDS:60}

query:
  cache:
    ttl-seconds: ${QUERY_CACHE_TTL_SECONDS:3600}
  max-context-chunks: ${QUERY_MAX_CONTEXT_CHUNKS:8}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.contextengine: ${LOG_LEVEL:INFO}
