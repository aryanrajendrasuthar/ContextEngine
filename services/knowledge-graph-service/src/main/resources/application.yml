
server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: knowledge-graph-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:knowledge-graph-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.contextengine.*
        isolation.level: read_committed
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:3}

neo4j:
  uri: ${NEO4J_URI:bolt://localhost:7687}
  username: ${NEO4J_USERNAME:neo4j}
  password: ${NEO4J_PASSWORD:contextengine_secret}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

kafka:
  topics:
    knowledge-processed: contextengine.knowledge.processed
    knowledge-errors: contextengine.knowledge.errors

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.contextengine: ${LOG_LEVEL:INFO}
