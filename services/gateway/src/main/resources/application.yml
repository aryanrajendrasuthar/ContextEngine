
server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**, /api/v1/organizations/**
        - id: ingestion-service
          uri: ${INGESTION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/events/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${INGESTION_RATE_LIMIT_RPS:5}
                redis-rate-limiter.burstCapacity: ${INGESTION_RATE_LIMIT_BURST:10}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@organizationKeyResolver}"
        - id: connector-service
          uri: ${CONNECTOR_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/connectors/**
        - id: query-service
          uri: ${QUERY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/query/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${QUERY_RATE_LIMIT_RPS:10}
                redis-rate-limiter.burstCapacity: ${QUERY_RATE_LIMIT_BURST:20}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@organizationKeyResolver}"
        - id: graph-api
          uri: ${QUERY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/graph/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowed-methods: GET, POST, PUT, DELETE, OPTIONS
            allowed-headers: "*"
            allow-credentials: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits}

logging:
  level:
    com.contextengine: ${LOG_LEVEL:INFO}
    org.springframework.cloud.gateway: ${GATEWAY_LOG_LEVEL:INFO}
