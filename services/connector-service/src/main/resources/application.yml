
server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: connector-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/contextengine}
    username: ${SPRING_DATASOURCE_USERNAME:contextengine}
    password: ${SPRING_DATASOURCE_PASSWORD:contextengine_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      pool-name: ConnectorServicePool
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history_connector

ingestion:
  service:
    url: ${INGESTION_SERVICE_URL:http://localhost:8082}

connectors:
  scheduler:
    interval-ms: ${CONNECTOR_SCHEDULER_INTERVAL_MS:60000}
  github:
    api-url: ${GITHUB_API_URL:https://api.github.com}
    token: ${GITHUB_TOKEN:}
    poll-interval-seconds: ${GITHUB_POLL_INTERVAL:300}
  slack:
    api-url: ${SLACK_API_URL:https://slack.com/api}
    token: ${SLACK_TOKEN:}
    poll-interval-seconds: ${SLACK_POLL_INTERVAL:60}
  jira:
    api-url: ${JIRA_API_URL:}
    username: ${JIRA_USERNAME:}
    token: ${JIRA_TOKEN:}
    poll-interval-seconds: ${JIRA_POLL_INTERVAL:300}

resilience4j:
  circuitbreaker:
    instances:
      ingestion-service:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      ingestion-service:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.contextengine: ${LOG_LEVEL:INFO}
