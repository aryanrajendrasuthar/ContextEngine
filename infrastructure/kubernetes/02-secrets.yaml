
# DO NOT commit real secrets to version control.
# Replace placeholder values before deploying.
# In production, use a secrets manager (Vault, AWS Secrets Manager, or Sealed Secrets).
apiVersion: v1
kind: Secret
metadata:
  name: contextengine-secrets
  namespace: contextengine
type: Opaque
stringData:
  # Rotate this before production. Must be >= 32 characters.
  JWT_SECRET: "REPLACE_WITH_A_STRONG_RANDOM_SECRET_AT_LEAST_32_CHARS"

  # PostgreSQL credentials — must match your PostgreSQL deployment
  SPRING_DATASOURCE_USERNAME: "contextengine"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_WITH_DB_PASSWORD"

  # Neo4j credentials
  NEO4J_PASSWORD: "REPLACE_WITH_NEO4J_PASSWORD"

  # Qdrant API key — leave blank if running without authentication
  QDRANT_API_KEY: ""
