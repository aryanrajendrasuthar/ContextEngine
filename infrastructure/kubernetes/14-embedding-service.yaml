
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: contextengine
  labels:
    app.kubernetes.io/name: embedding-service
    app.kubernetes.io/part-of: contextengine
spec:
  # Only one replica — Kafka consumer group handles parallelism at the topic partition level.
  # To scale, increase partition count and replicas together.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: embedding-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: embedding-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8086"
    spec:
      containers:
        - name: embedding-service
          image: contextengine/embedding-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: contextengine-config
          env:
            - name: PORT
              value: "8086"
          resources:
            # Embedding models need substantial memory. Adjust if using larger models.
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: contextengine
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: embedding-service
  ports:
    - port: 8086
      targetPort: 8086
      protocol: TCP
