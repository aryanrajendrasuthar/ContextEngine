
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  namespace: contextengine
  labels:
    app.kubernetes.io/name: query-service
    app.kubernetes.io/part-of: contextengine
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: query-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: query-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8084"
    spec:
      containers:
        - name: query-service
          image: contextengine/query-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: contextengine-config
            - secretRef:
                name: contextengine-secrets
          env:
            - name: SERVER_PORT
              value: "8084"
          resources:
            requests:
              cpu: "300m"
              memory: "768Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 45
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: query-service
  namespace: contextengine
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: query-service
  ports:
    - port: 8084
      targetPort: 8084
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: query-service-hpa
  namespace: contextengine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: query-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
